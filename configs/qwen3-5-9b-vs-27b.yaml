run_label: qwen3-5-9b-vs-27b

defaults:
  runs_per_test: 1        # each call triggers a full Harbor job — don't repeat
  keep_model_files: true

models:
  # https://huggingface.co/unsloth/Qwen3.5-9B-GGUF
  # Qwen3.5-9B Q6 quants
  - unsloth/Qwen3.5-9B-GGUF:Qwen3.5-9B-Q6_K.gguf
  - unsloth/Qwen3.5-9B-GGUF:Qwen3.5-9B-UD-Q6_K_XL.gguf
  # Qwen3.5-9B Q8 quants
  - unsloth/Qwen3.5-9B-GGUF:Qwen3.5-9B-Q8_0.gguf
  - unsloth/Qwen3.5-9B-GGUF:Qwen3.5-9B-UD-Q8_K_XL.gguf
  
  # https://huggingface.co/unsloth/Qwen3.5-27B-GGUF
  # Qwen3.5-27B Q2 quants
  - unsloth/Qwen3.5-27B-GGUF:UD-IQ2_M
  - unsloth/Qwen3.5-27B-GGUF:UD-Q2_K_XL
  # Qwen3.5-27B Q3 quants
  - unsloth/Qwen3.5-27B-GGUF:Q3_K_S
  - unsloth/Qwen3.5-27B-GGUF:Q3_K_M
  - unsloth/Qwen3.5-27B-GGUF:UD-IQ3_XXS
  - unsloth/Qwen3.5-27B-GGUF:UD-Q3_K_XL

benchmarks:
  - type: terminal_bench
    name: tbench_easy_medium_hard
    # name: tbench_easy
    config:
      difficulties: ["easy", "medium", "hard"]
      # difficulties: ["easy"]
      port: 8765
      harbor_agent: terminus-2
      dataset_version: "2.0"
      jobs_dir: ./results/harbor
      n_concurrent: 2
      n_ctx: 16384
      sample_size: 10
      seed: 42

