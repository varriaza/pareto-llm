name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --extra terminal-bench

      - name: Run tests (excluding mlx and cuda)
        run: uv run pytest -m "not mlx and not cuda" --cov=src/pareto_llm --cov-report=term-missing -v
