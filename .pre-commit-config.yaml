repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: pytest
        name: pytest (unit tests)
        entry: uv run pytest -m "not mlx and not cuda" -q
        language: system
        pass_filenames: false
        always_run: true

      - id: check-architecture-diagram
        name: Check architecture diagram
        entry: scripts/check_diagram.sh
        language: script
        pass_filenames: false
